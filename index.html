<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Tier List · Spotify</title>
  <meta name="description" content="Classifique músicas da sua playlist do Spotify em tiers S a D com arrastar e soltar." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%231db954'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='13' fill='%23000'%3ES%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="logo" width="28" height="28" viewBox="0 0 24 24" fill="none" aria-label="Tier List logo">
        <rect x="1" y="1" width="22" height="22" rx="5" stroke="currentColor" stroke-width="1.8"/>
        <path d="M7 8h10M7 12h6M7 16h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <h1>Music Tier List</h1>
    </div>
    <div class="topbar-actions">
      <button id="btnSpotifyAuth" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Conectar ao Spotify
      </button>
      <button id="btnReset" class="btn-ghost danger">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Limpar tudo
      </button>
    </div>
  </header>

  <main class="app">
    <!-- Playlist import -->
    <section class="playlist-bar">
      <div class="playlist-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <input id="playlistUrl" placeholder="Cole o link da playlist do Spotify aqui..." />
        <button id="btnLoadPlaylist" class="btn-primary">Importar</button>
      </div>

      <div id="loadingContainer" class="loading-container" hidden>
        <div class="loading-bar">
          <div id="loadingProgress" class="loading-progress"></div>
        </div>
        <p id="loadingStatus" class="loading-status">Aguardando...</p>
      </div>
    </section>

    <!-- Tier board -->
    <section id="tierBoard" class="tier-board">
      <!-- Injetado pelo JS -->
    </section>

    <!-- Pool -->
    <section class="pool-section">
      <div class="pool-header">
        <h3>Músicas para classificar</h3>
        <span class="muted" id="poolCount">0</span>
      </div>
      <div id="pool" class="pool">
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <p>Cole o link de uma playlist pública do Spotify para começar.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
