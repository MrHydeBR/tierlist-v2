<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Tier List · Spotify</title>
  <meta name="description"
    content="Classifique músicas da sua playlist do Spotify em tiers S a D com arrastar e soltar." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%231db954'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='13' fill='%23000'%3ES%3C/text%3E%3C/svg%3E" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <svg class="logo" width="28" height="28" viewBox="0 0 24 24" fill="none" aria-label="Tier List logo">
        <rect x="1" y="1" width="22" height="22" rx="5" stroke="currentColor" stroke-width="1.8" />
        <path d="M7 8h10M7 12h6M7 16h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </svg>
      <h1>Music Tier List</h1>
    </div>
    <div class="topbar-actions">
      <button id="btnThemeToggle" class="btn-ghost" title="Alternar Tema">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      </button>
      <button id="btnShare" class="btn-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
          <polyline points="16 6 12 2 8 6" />
          <line x1="12" y1="2" x2="12" y2="15" />
        </svg>
        Compartilhar
      </button>
      <button id="btnExport" class="btn-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Exportar PNG
      </button>
<button id="btnReset" class="btn-ghost danger">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
        Limpar tudo
      </button>
    </div>
  </header>

  <main class="app">
    <!-- Playlist import -->
    <section class="playlist-bar">
      <div class="playlist-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13" />
          <circle cx="6" cy="18" r="3" />
          <circle cx="18" cy="16" r="3" />
        </svg>
        <input id="playlistUrl" placeholder="Cole o link da playlist do Spotify aqui..." />
        <button id="btnLoadPlaylist" class="btn-primary">Importar</button>
      </div>

      <div id="loadingContainer" class="loading-container" hidden>
        <div class="loading-bar">
          <div id="loadingProgress" class="loading-progress"></div>
        </div>
        <p id="loadingStatus" class="loading-status">Aguardando...</p>
      </div>
    </section>

    <!-- Tier board -->
    <section id="tierBoard" class="tier-board">
      <!-- Injetado pelo JS -->
    </section>

    <!-- Pool -->
    <section class="pool-section">
      <div class="pool-header">
        <h3>Músicas para classificar</h3>
        <span class="muted" id="poolCount">0</span>
      </div>
      <div id="pool" class="pool">
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
          <p>Cole o link de uma playlist pública do Spotify para começar.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="app.js" type="module"></script>
</body>

</html>
